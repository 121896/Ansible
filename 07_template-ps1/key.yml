---
- name: 앤서블 컨트롤러의 SSH 공개키를 대상 호스트들에 배포
  hosts: all
  gather_facts: false
  remote_user: devops
  become: true

  vars:
    # 최초 1회 인증을 위해 패스워드를 지정합니다.
    ansible_ssh_pass: soldesk1.
    ansible_become_pass: soldesk1.

  tasks:
    - name: devops 사용자의 .ssh 디렉터리가 존재하는지 확인 및 생성
      ansible.builtin.file:
        path: /home/devops/.ssh
        state: directory
        owner: devops
        group: devops
        mode: '0700'

    - name: 컨트롤러의 공개키(id_rsa.pub)를 authorized_keys에 등록
      ansible.builtin.authorized_key:
        user: devops
        state: present
        # 컨트롤러 서버의 해당 경로에 있는 공개키 내용을 읽어와 주입합니다.
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

    - name: .ssh/authorized_keys 파일 권한 보안 설정
      ansible.builtin.file:
        path: /home/devops/.ssh/authorized_keys
        owner: devops
        group: devops
        mode: '0600'
