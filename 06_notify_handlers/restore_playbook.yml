---
- name: Restore playbook.yml
  hosts: all
  gather_facts: false
  remote_user: root
  tasks:

    # 1) DB 종료 - mariadb
    - name: 1) DB 종료 - mariadb
      ansible.builtin.systemd:
        name: mariadb
        state: stopped
        enabled: false
      ignore_errors: true


    # 2) DB 패키지 삭제 - mariadb, mariadb-server, python3-PyMySQL
    - name: 2) DB 패키지 삭제 - mariadb, mariadb-server, python3-PyMySQL
      ansible.builtin.dnf:
        name:
          - mariadb
          - mariadb-server
          - python3-PyMySQL
        state: absent
