---
- name: Restore_createuser.yml
  hosts: all
  vars_files:
    - vars/secret.yml
  tasks:

    ######################################
    # 1) 사용자 삭제
    ######################################

    - name: 1) 사용자 삭제
      ansible.builtin.user:
        name: "{{ item.name }}"
        state: absent
        remove: true
      loop: "{{ newusers }}"

