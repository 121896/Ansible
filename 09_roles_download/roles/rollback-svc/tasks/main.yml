---
# tasks file for roles/rollback-svc
#######################################
# 1) 방화벽 서비스 제거 - (필수) http, https
# 2) 서비스 종료 - (필수) httpd, firewalld
# 3) 서비스 설정 제거 (필수)
# - /var/www/vhosts/{{ inventory_hostname }}/index.html
# - /var/www/vhosts/{{ inventory_hostname }}
# - /etc/httpd/conf.d/vhost.conf
# 4) 패키지 삭제 - (필수) httpd, mod_ssl
#######################################

# 1) 방화벽 서비스 제거 - (필수) http, https
- name: 1) Close the firewall service port
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: disabled
  loop: "{{ fw_svcs }}"

# 2) 서비스 종료 - (필수) httpd, firewalld
- name: 2) Stop the service
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ svcs }}"
  ignore_errors: true

# 3) 서비스 설정 제거 (필수)
# - /var/www/vhosts/{{ inventory_hostname }}/index.html
# - /var/www/vhosts/{{ inventory_hostname }}
# - /etc/httpd/conf.d/vhost.conf
- name: 3) Rollback the service configuration
  ansible.builtin.file:
    name: "{{ item }}"
    state: absent
  loop: "{{ files }}"

# 4) 패키지 삭제 - (필수) httpd, mod_ssl
- name: 4) Remove the packages
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: absent
  loop: "{{ pkgs }}"
