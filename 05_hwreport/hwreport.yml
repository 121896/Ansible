---
- name: 0) 하드웨어 보고서 작성
  hosts: all
  become: true
  gather_facts: true
  vars:
    file_src: files/hwreport.txt
    file_dest: /root/hwreport.txt
    dir_results: results
  tasks:
    ###############################
    # 1) 파일 배포 - copy
    # 2) 파일 작성 - replace, lineinfile
    # 3) 파일 수집 - fetch
    ###############################


    # 1) 파일 배포 - copy
    # * "{{ file_src }}" -- copy --> "{{ file_dest }}" (root:root 0600)
    - name: 1) 파일 배포
      ansible.builtin.copy:
        src: "{{ file_src }}"
        dest: "{{ file_dest }}"
        owner: root
        group: root
        mode: '0600'


    # 2) 파일 작성 - replace, lineinfile
    # NVENTORY_HOSTNAME = ansible
    - name: 2) 파일 작성 - inventory_hostname {{ inventory_hostname }}
      ansible.builtin.replace:
        path: "{{ file_dest }}"
        regexp: 'inventoryhostname'
        replace: "{{ inventory_hostname }}"
    # TOTAL_MEM = 2865196
    - name: 2) 파일 작성 - ansible_memtotal_mb {{ ansible_memtotal_mb }}
      ansible.builtin.replace:
        path: "{{ file_dest }}"
        regexp: 'totalmem'
        replace: "{{ ansible_memtotal_mb }}"
    # BIOS_VER = 6.00
    - name: 2) 파일 작성 - ansible_bios_version {{ ansible_bios_version }}
      ansible.builtin.lineinfile:
        path: "{{ file_dest }}"
        regexp: 'biosversion'
        line: "BIOS_VER = {{ ansible_bios_version }}"
    # SDA_SIZE = 60.00 GB
    - name: 2) 파일 작성 - ansible_devices.sda.size {{ ansible_devices.sda.size }}
      ansible.builtin.lineinfile:
        path: "{{ file_dest }}"
        regexp: 'sdasize'
        line: "SDA_SIZE = {{ ansible_devices.sda.size }}"


    # 3) 파일 수집 - fetch
    # flat: true
    # flat: false
    - name: 3) 파일 수집
      ansible.builtin.fetch:
        src: "{{ file_dest }}"
        dest: "{{ dir_results }}/{{ inventory_hostname }}-hwreport.txt"
        flat: true
