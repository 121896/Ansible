---
- name: Restore_factcheck.yml
  hosts: all
  gather_facts: false
  tasks:
    ###############################################
    # >>>> 팩트 변수를 사용하지 않는 플레이북 <<<<
    ###############################################
    # => gather_facts: false

    - name: 1) 방화벽 포트 제거 - http
      ansible.posix.firewalld:
        service: http
        permanent: true
        immediate: true
        state: disabled

    - name: 2) 서비스 중지 - httpd
      ansible.builtin.service:
        name: httpd
        state: stopped
        enabled: false

    - name: 2) 서비스 중지 - firewalld
      ansible.builtin.service:
        name: firewalld
        state: stopped
        enabled: false

    - name: 3) index.html 파일 삭제
      ansible.builtin.file:
        path: /var/www/html/index.html
        state: absent

    - name: 4) 패키지 삭제 - httpd
      ansible.builtin.yum:
        name: httpd
        state: absent
