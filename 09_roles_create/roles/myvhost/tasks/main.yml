---
# tasks file for roles/myvhost
##################################
# 1) 패키지 설치 -httpd, mod_ssl
# 2) 서비스 설정
# - /var/www/vhosts/{{ inventory_hostname }}
# - index.html -- copy --> /var/www/vhosts/{{ inventory_hostname }}/index.html
# 3) 서비스 기동 - httpd
# 4) 서비스 설정
# - templates/vhost.conf.j2 -- template --> /etc/httpd/conf.d/vhost.conf
# - notify ~ handler
##################################

# 1) 패키지 설치 -httpd, mod_ssl
- name: Install the package - {{ pkgs }}
  ansible.builtin.dnf:
    name: "{{ pkgs }}"
    state: present

# 2) 서비스 설정
# - /var/www/vhosts/{{ inventory_hostname }}
- name: Create a directory - /var/www/vhosts/{{ inventory_hostname }}
  ansible.builtin.file:
    path: /var/www/vhosts/{{ inventory_hostname }}
    state: directory
    owner: root
    group: root
    mode: '0755'
# - index.html -- copy --> /var/www/vhosts/{{ inventory_hostname }}/index.html
- name: Create a index file - /var/www/vhosts/{{ inventory_hostname }}/index.html
  ansible.builtin.copy:
    src: index.html
    dest: /var/www/vhosts/{{ inventory_hostname }}/index.html
    mode: '0644'

# 3) 서비스 기동 - httpd
- name: Start the web service - {{ svcs }}
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ svcs }}"

# 4) 서비스 설정
# - templates/vhost.conf.j2 -- template --> /etc/httpd/conf.d/vhost.conf
- name: Configuring the web directory - {{ webconf }}
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: /etc/httpd/conf.d/vhost.conf
    mode: '0644'
# - notify ~ handler
  notify:
    - restart httpd
