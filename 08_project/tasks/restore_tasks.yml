######################################
# 1) 방화벽 서비스 제거
# 2) 서비스 종료
# 3) 서비스 설정 삭제
# 4) 패키지 삭제
######################################

# 1) 방화벽 서비스 제거
- name: Remove the FW service - {{ fw_svcs }}
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: disabled
  loop: "{{ fw_svcs }}"

# 2) 서비스 종료
- name: Stop the unit - {{ svcs }}
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ svcs }}"
  ignore_errors: true

# 3) 서비스 설정 삭제
- name: Remove the files - {{ files }}
  ansible.builtin.file:
    name: "{{ item }}"
    state: absent
  loop: "{{ files }}"

# 4) 패키지 삭제
- name: Remove the packages - {{ pkgs }}
  ansible.builtin.dnf:
    name: "{{ pkgs }}"
    state: absent
