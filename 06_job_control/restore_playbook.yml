---
- name: Restore playbook.yml
  hosts: all
  vars:
    web_package: httpd
    db_package: mariadb-server
    db_service: mariadb
  tasks:
  - name: 블럭을 사용한 처리 예제

    block:
    - name: 1) 서비스 중지 - {{ db_service }}
      ansible.builtin.service:
        name: "{{ db_service }}"
        state: stopped
        enabled: false

    rescue:
    - name: 2) 서비스 중지 확인 - {{ db_service }}
      ansible.builtin.debug:
        msg: 서비스가 이미 중지됨 - {{ db_service }}

    always:
    - name: 2) 패키지 삭제 - {{ web_package }}, {{ db_package }}
      ansible.builtin.yum:
        name:
          - "{{ web_package }}"
          - "{{ db_package }}"
        state: absent
