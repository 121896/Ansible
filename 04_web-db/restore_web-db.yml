---
- name: Restore web-db.yml
  hosts: all
  tasks:

  # 1) 방화벽 서비스 제거 - http(80/tcp), https(443/tcp), mysql(3306/tcp)
  - name: 1) 방화벽 서비스 제거 - http(80/tcp)
    ansible.posix.firewalld:
      service: http
      permanent: true
      immediate: true
      state: disabled

  - name: 1) 방화벽 서비스 제거 - https(443/tcp)
    ansible.posix.firewalld:
      service: https
      permanent: true
      immediate: true
      state: disabled

  - name: 1) 방화벽 서비스 제거 - mysql(3306/tcp)
    ansible.posix.firewalld:
      service: mysql
      permanent: true
      immediate: true
      state: disabled


  # 2) 서비스 설정 제거 - /var/www/html/index.php
  - name: 2) 서비스 설정 제거
    ansible.builtin.file:
      path: /var/www/html/index.php
      state: absent


  # 3) 서비스 비활성화 - httpd, firewalld, mariadb
  - name: 3) 서비스 비활성화 - httpd
    ansible.builtin.systemd:
      name: httpd
      state: stopped
      enabled: false

  - name: 3) 서비스 비활성화 - firewalld
    ansible.builtin.systemd:
      name: firewalld
      state: stopped
      enabled: false

  - name: 3) 서비스 비활성화 - mariadb
    ansible.builtin.systemd:
      name: mariadb
      state: stopped
      enabled: false


  # 4) 패키지 제거 - httpd, mod_ssl, php, php-mysqlnd, php-pdo, mariadb, mariadb-server, python3-PyMySQL, python3-pexpect
  - name: 4) 패키지 삭제
    ansible.builtin.dnf:
      name:
        - httpd
        - mod_ssl
        - php
        - php-mysqlnd
        - php-pdo
        - mariadb
        - mariadb-server
        - python3-PyMySQL
        - python3-pexpect
      state: absent
